name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io                          # ← changed from ghcr.io
  IMAGE_OWNER: ${{ vars.DOCKERHUB_USERNAME }}  # ← pulls from Variables tab
  DEPLOY_REPO: azizaman/jerney-deploy
  HELM_VALUES_PATH: k8s/helm/jerney/values.yaml

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint & Test
  # ─────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Install & Test backend
        working-directory: ./backend
        run: |
          npm ci
          npm run lint
          npm test

      - name: Install & Test frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint
          npm test

  # ─────────────────────────────────────────
  # JOB 2: Build & Push Images
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%s)
          IMAGE_TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub        # ← changed
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}   # ← changed
          password: ${{ secrets.DOCKERHUB_TOKEN }}   # ← changed

      - name: Build & Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_OWNER }}/jerney-backend:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_OWNER }}/jerney-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_OWNER }}/jerney-frontend:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_OWNER }}/jerney-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────
  # JOB 3: Update Deployment Repo
  # ─────────────────────────────────────────
  update-deploy-repo:
    name: Update jerney-deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout jerney-deploy repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOY_REPO }}
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          ref: main

      - name: Install yq
        uses: mikefarah/yq@v4.44.1

      - name: Update image tags in values.yaml
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          VALUES_FILE="${{ env.HELM_VALUES_PATH }}"

          yq e ".backend.tag = \"${IMAGE_TAG}\"" -i "${VALUES_FILE}"
          yq e ".frontend.tag = \"${IMAGE_TAG}\"" -i "${VALUES_FILE}"

          cat "${VALUES_FILE}"

      - name: Commit and push
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes — skipping commit"
            exit 0
          fi

          git add "${{ env.HELM_VALUES_PATH }}"
          git commit -m "chore(deploy): update image tags to ${IMAGE_TAG} [skip ci]"
          git push origin main
