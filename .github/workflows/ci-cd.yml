name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: azizaman               # lowercase GitHub username/org
  DEPLOY_REPO: azizaman/jerney-deploy
  HELM_VALUES_PATH: k8s/helm/jerney/values.yaml

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint & Test
  # ─────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint backend
        working-directory: ./backend
        run: npm run lint

      - name: Test backend
        working-directory: ./backend
        run: npm test

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Test frontend
        working-directory: ./frontend
        run: npm test

  # ─────────────────────────────────────────
  # JOB 2: Build & Push Images
  # Only runs on push to main (not PRs)
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      # Pass the image tags to the next job
      image_tag: ${{ steps.meta.outputs.image_tag }}

    permissions:
      contents: read
      packages: write   # Required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Generate a deterministic, traceable image tag
      # Format: <short-sha>-<unix-timestamp>
      # e.g., a1b2c3d-1714123456
      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%s)
          IMAGE_TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${IMAGE_TAG}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # Enable Docker layer caching and multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend Image ──
      - name: Build & Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/jerney-backend:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/jerney-backend:latest
          # Docker layer caching — dramatically speeds up builds
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          # Build-time labels for traceability
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # ── Frontend Image ──
      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/jerney-frontend:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/jerney-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ─────────────────────────────────────────
  # JOB 3: Update Deployment Repo
  # Runs after images are confirmed pushed
  # ─────────────────────────────────────────
  update-deploy-repo:
    name: Update jerney-deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout jerney-deploy repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOY_REPO }}
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          # Always checkout from the main/master branch
          ref: main

      # yq is the safe, structured way to patch YAML
      # Never use sed for YAML — it breaks on special chars
      - name: Install yq
        uses: chrisgavin/setup-yq@v1.2

      - name: Update image tags in values.yaml
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          VALUES_FILE="${{ env.HELM_VALUES_PATH }}"

          echo "Patching ${VALUES_FILE} with tag: ${IMAGE_TAG}"

          # Atomically update both tags using yq
          # yq reads the YAML structure — no fragile string matching
          yq e ".backend.tag = \"${IMAGE_TAG}\"" -i "${VALUES_FILE}"
          yq e ".frontend.tag = \"${IMAGE_TAG}\"" -i "${VALUES_FILE}"

          echo "--- Updated values.yaml preview ---"
          cat "${VALUES_FILE}"

      - name: Verify YAML is valid after patch
        run: |
          yq e '.' "${{ env.HELM_VALUES_PATH }}" > /dev/null
          echo "YAML validation passed"

      - name: Commit and push changes
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          SOURCE_SHA="${{ github.sha }}"
          SOURCE_REPO="${{ github.repository }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if something actually changed
          if git diff --quiet; then
            echo "No changes to values.yaml — skipping commit"
            exit 0
          fi

          git add "${{ env.HELM_VALUES_PATH }}"

          # Commit message follows Conventional Commits spec
          # [skip ci] prevents this commit from triggering CI in deploy repo
          git commit -m "chore(deploy): update image tags to ${IMAGE_TAG} [skip ci]

          Source: ${SOURCE_REPO}@${SOURCE_SHA}
          Backend:  ghcr.io/azizaman/jerney-backend:${IMAGE_TAG}
          Frontend: ghcr.io/azizaman/jerney-frontend:${IMAGE_TAG}"

          git push origin main



          
